<div class="page">

    <h2>Luyện đọc số (0 → 10)</h2>

    <div class="card" id="card">
        Bấm bắt đầu
    </div>

    <br>
    <button class="btn" id="startBtn">Bắt đầu</button>
    <button class="btn reset" id="resetBtn">Reset</button>

</div>

<style>
.page {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100%;
    text-align: center;
    padding: 20px;
}

h2 {
    margin-bottom: 20px;
}

.card {
    width: 260px;
    height: 140px;
    background: white;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 38px;
    font-weight: bold;
}

.pinyin {
    font-size: 42px;
    color: #222;
}

.meaning {
    font-size: 34px;
    color: #e53935;
}

.note {
    font-size: 16px;
    color: #666;
    margin-top: 8px;
    font-weight: normal;
}

.btn {
    margin: 8px;
    padding: 10px 22px;
    border: none;
    background: #4CAF50;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
}

.btn:hover {
    opacity: 0.85;
}

.reset {
    background: #f44336;
}
</style>

<script>
let numbers = [
    { pinyin: "líng", meaning: "số 0" },
    { pinyin: "yī", meaning: "số 1" },
    { pinyin: "èr", meaning: "số 2" },
    { pinyin: "sān", meaning: "số 3" },
    { pinyin: "sì", meaning: "số 4" },
    { pinyin: "wǔ", meaning: "số 5" },
    { pinyin: "liù", meaning: "số 6" },
    { pinyin: "qī", meaning: "số 7" },
    { pinyin: "bā", meaning: "số 8" },
    { pinyin: "jiǔ", meaning: "số 9" },
    { pinyin: "shí", meaning: "số 10" }
];

let remainingNumbers = [];
let timer1;
let timer2;

// trộn mảng ngẫu nhiên
function shuffleArray(array) {
    return array.sort(() => Math.random() - 0.5);
}

// bắt đầu
function start() {
    clearTimeout(timer1);
    clearTimeout(timer2);

    remainingNumbers = shuffleArray([...numbers]);

    nextNumber();
}

// hiện từng số
function nextNumber() {
    if (remainingNumbers.length === 0) {
        document.getElementById("card").innerHTML = `
            <div class="meaning">Hết!</div>
            <div class="note">Bạn đã học xong 0 → 10</div>
        `;
        return;
    }

    let current = remainingNumbers.pop();

    // hiện pinyin 3 giây
    document.getElementById("card").innerHTML = `
        <div class="pinyin">${current.pinyin}</div>
        <div class="note">Hãy đọc nghĩa tiếng Việt</div>
    `;

    timer1 = setTimeout(() => {

        // hiện nghĩa tiếng Việt 5 giây
        document.getElementById("card").innerHTML = `
            <div class="meaning">${current.meaning}</div>
        `;

        timer2 = setTimeout(() => {
            nextNumber();
        }, 5000);

    }, 3000);
}

// reset
function reset() {
    clearTimeout(timer1);
    clearTimeout(timer2);

    remainingNumbers = [];
    document.getElementById("card").innerText = "Bấm bắt đầu";
}

// gán sự kiện
document.getElementById("startBtn").onclick = start;
document.getElementById("resetBtn").onclick = reset;
</script>
