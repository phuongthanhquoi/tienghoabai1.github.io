<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Flashcard Tiếng Trung</title>
<style>
    body {
        font-family: Arial;
        text-align: center;
        background: #f5f5f5;
        padding-top: 50px;
    }
    .card {
        width: 300px;
        height: 150px;
        margin: auto;
        background: white;
        border-radius: 15px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
    }
    .btn {
        margin-top: 20px;
        padding: 10px 20px;
        border: none;
        background: #4CAF50;
        color: white;
        border-radius: 8px;
        cursor: pointer;
    }
</style>
</head>
<body>

<h2>Flashcard Tiếng Trung (3 giây + Pinyin)</h2>

<div class="card" id="card">
    Bấm bắt đầu
</div>

<br>
<button class="btn" onclick="start()">Bắt đầu</button>
<button class="btn" onclick="reset()">Reset</button>

<script>
let words = [
    { hanzi: "你", pinyin: "nǐ" },
    { hanzi: "好", pinyin: "hǎo" },
    { hanzi: "身体", pinyin: "shēn tǐ" },
    { hanzi: "吗", pinyin: "ma" },
    { hanzi: "很", pinyin: "hěn" },
    { hanzi: "谢谢", pinyin: "xiè xie" },
    { hanzi: "好久", pinyin: "hǎo jiǔ" },
    { hanzi: "不", pinyin: "bù" },
    { hanzi: "见", pinyin: "jiàn" },
    { hanzi: "也", pinyin: "yě" },
    { hanzi: "呢", pinyin: "ne" },
    { hanzi: "您", pinyin: "nín" },
    { hanzi: "学生", pinyin: "xué shēng" },
    { hanzi: "我", pinyin: "wǒ" },
    { hanzi: "是", pinyin: "shì" },
    { hanzi: "老师", pinyin: "lǎo shī" },
    { hanzi: "对不起", pinyin: "duì bù qǐ" },
    { hanzi: "再见", pinyin: "zài jiàn" }
];

let shuffled = [];
let index = 0;
let timer;

// xáo trộn
function shuffleArray(arr) {
    return arr.sort(() => Math.random() - 0.5);
}

// bắt đầu
function start() {
    shuffled = shuffleArray([...words]);
    index = 0;
    nextWord();
}

// hiển thị từ
function nextWord() {
    if (index >= shuffled.length) {
        document.getElementById("card").innerText = "Hết 18 từ!";
        return;
    }

    let current = shuffled[index];
    document.getElementById("card").innerText = current.hanzi;

    clearTimeout(timer);

    timer = setTimeout(() => {
        alert("Phiên âm: " + current.pinyin);
        index++;
        nextWord();
    }, 3000);
}

// reset
function reset() {
    clearTimeout(timer);
    shuffled = [];
    index = 0;
    document.getElementById("card").innerText = "Bấm bắt đầu";
}
</script>

</body>
</html>
