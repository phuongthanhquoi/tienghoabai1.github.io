<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>App Học Tiếng Hoa</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>
body {
    background: #f4f6f9;
}

/* sidebar */
.sidebar {
    background: #2c3e50;
    color: white;
    min-height: 100vh;
}

.menu-parent {
    cursor: pointer;
    padding: 12px 16px;
}

.menu-parent:hover {
    background: #34495e;
}

.submenu {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
    background: #34495e;
}

.submenu.open {
    max-height: 300px;
}

.menu-item {
    padding: 10px 30px;
    cursor: pointer;
    font-size: 14px;
}

.menu-item:hover {
    background: #3d566e;
}

.menu-item.active {
    background: #1abc9c;
}

.arrow {
    transition: transform 0.3s;
}

.menu-parent.active .arrow {
    transform: rotate(90deg);
}

.content-area {
    min-height: 100vh;
}
</style>
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-3 col-lg-2 sidebar p-0 d-none d-md-block" id="sidebar">
            <h4 class="text-center py-3">📚 Học Tiếng Hoa</h4>

            <div class="menu-parent d-flex justify-content-between">
                <span>📖 Bài 1</span>
                <span class="arrow">▶</span>
            </div>
            <div class="submenu">
                <div class="menu-item" data-page="/bai1/pinyin_bai1.html">Từ mới</div>
                <div class="menu-item" data-page="/bai1/guess_meaning.html">Nghĩa từ</div>
                <div class="menu-item" data-page="/bai1/viet_to_chinese.html">Nhìn nghĩa – đọc Hoa</div>
                <div class="menu-item" data-page="/bai1/listen.html">Luyện nghe</div>
            </div>

           <!-- Menu cha -->
            <div class="menu-parent d-flex justify-content-between">
                <span>🔢 Số đếm</span>
                <span class="arrow">▶</span>
            </div>

            <div class="submenu">

                <!-- ===== 0 tới 10 ===== -->
                <div class="menu-parent d-flex justify-content-between">
                    <span>0 tới 10</span>
                    <span class="arrow">▶</span>
                </div>

                <div class="submenu">
                    <div class="menu-item" data-page="sodem.html">Số thường</div>
                    <div class="menu-item" data-page="count.html">Chữ Hoa</div>
                </div>

                <!-- ===== 10 tới 100 ===== -->
                <div class="menu-parent d-flex justify-content-between">
                    <span>10 tới 100</span>
                    <span class="arrow">▶</span>
                </div>

                <div class="submenu">
                    <div class="menu-item" data-page="sodem.html">Số thường</div>
                    <div class="menu-item" data-page="count.html">Chữ Hoa</div>
                </div>

            </div>

            <div class="menu-parent d-flex justify-content-between">
                <span>🔤 Phát âm</span>
                <span class="arrow">▶</span>
            </div>
            <div class="submenu">
                <div class="menu-item" data-page="thanmau.html">Thanh mẫu</div>
                <div class="menu-item" data-page="vanmau.html">Vận mẫu</div>
            </div>

            <div class="menu-parent d-flex justify-content-between">
                <span>📘 Từ vựng</span>
                <span class="arrow">▶</span>
            </div>
            <div class="submenu">
                <div class="menu-item" data-page="tuvung23.html">23 từ vựng</div>
            </div>
        </div>

        <!-- Content -->
        <div class="col-md-9 col-lg-10 content-area d-flex justify-content-center align-items-center p-3">
            <div class="w-100" style="max-width:700px;" id="content">
                <div class="text-center text-muted">Chọn bài học bên trái</div>
            </div>
        </div>

    </div>
</div>

<!-- nút mở menu mobile -->
<button class="btn btn-primary d-md-none position-fixed top-0 start-0 m-2" id="menuBtn">
    ☰
</button>

<script>
$(document).ready(function(){

    // mở / đóng menu cha - hỗ trợ nhiều cấp
    $(".menu-parent").click(function(e){
        e.stopPropagation(); // 🛑 chặn lan lên

        let submenu = $(this).next(".submenu");

        // chỉ đóng các submenu cùng cấp
        $(this).parent().find("> .submenu").not(submenu).removeClass("open");
        $(this).parent().find("> .menu-parent").not(this).removeClass("active");

        submenu.toggleClass("open");
        $(this).toggleClass("active");
    });

    // chọn item
    $(".menu-item").click(function(e){
        e.stopPropagation(); // 🛑 tránh đóng menu

        $(".menu-item").removeClass("active");
        $(this).addClass("active");

        let page = $(this).data("page");
        loadPage(page);

        // mobile thì ẩn menu
        if ($(window).width() < 768) {
            $("#sidebar").addClass("d-none");
        }
    });

    // nút mở menu mobile
    $("#menuBtn").click(function(){
        $("#sidebar").toggleClass("d-none");
    });

});

// load page
function loadPage(page) {
    $.get(page, function(data){
        $("#content").html(data);

        // chạy lại script
        $("#content script").each(function(){
            $.globalEval(this.text || this.textContent || this.innerHTML || '');
        });
    });
}
</script>

</body>
</html>
