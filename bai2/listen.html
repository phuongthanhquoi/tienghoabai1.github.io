<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trình phát file WAV</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #eef2ff, #f8fafc, #e0f2fe);
      padding: 24px;
    }

    .player-card {
      width: 100%;
      max-width: 460px;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.12);
      backdrop-filter: blur(8px);
    }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: #dbeafe;
      color: #1d4ed8;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      color: #0f172a;
    }

    .sub {
      margin: 0 0 24px;
      color: #475569;
      font-size: 15px;
      line-height: 1.5;
    }

    .file-box {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      padding: 14px 16px;
      margin-bottom: 22px;
      color: #334155;
      font-size: 14px;
      word-break: break-all;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 22px;
    }

    button {
      border: none;
      border-radius: 16px;
      padding: 14px 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 18px rgba(0, 0, 0, 0.08);
    }

    button:active {
      transform: translateY(0);
    }

    .play-btn {
      background: #2563eb;
      color: white;
    }

    .pause-btn {
      background: #f59e0b;
      color: white;
    }

    .restart-btn {
      background: #10b981;
      color: white;
    }

    .progress-wrap {
      margin-bottom: 10px;
    }

    .progress-bar {
      width: 100%;
      height: 10px;
      appearance: none;
      border-radius: 999px;
      background: #e2e8f0;
      outline: none;
      cursor: pointer;
    }

    .progress-bar::-webkit-slider-thumb {
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #2563eb;
      border: 3px solid white;
      box-shadow: 0 2px 8px rgba(37, 99, 235, 0.35);
    }

    .progress-bar::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #2563eb;
      border: 3px solid white;
      box-shadow: 0 2px 8px rgba(37, 99, 235, 0.35);
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      color: #64748b;
      font-size: 13px;
    }

    .status {
      margin-top: 18px;
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      color: #0f766e;
      background: #ecfeff;
      border: 1px solid #ccfbf1;
      border-radius: 14px;
      padding: 12px;
    }

    .hint {
      margin-top: 14px;
      text-align: center;
      font-size: 13px;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="player-card">
    <div class="badge">WAV PLAYER</div>
    <h1>Trình phát âm thanh</h1>
    <p class="sub">Trang HTML này hiển thị file <strong>.wav</strong> với nút <strong>Phát</strong>, <strong>Tạm dừng</strong> và <strong>Phát lại</strong> đẹp hơn.</p>

    <div class="file-box">
      File đang dùng: <strong>amthanh.wav</strong><br>
      Đổi tên trong thuộc tính <code>src</code> nếu bạn muốn dùng file khác.
    </div>

    <audio id="audio" src="../bai2/Track_3.wav"></audio>

    <div class="controls">
      <button class="play-btn" id="playBtn">▶ Phát</button>
      <button class="pause-btn" id="pauseBtn">⏸ Dừng</button>
      <button class="restart-btn" id="restartBtn">↺ Phát lại</button>
    </div>

    <div class="progress-wrap">
      <input type="range" id="progress" class="progress-bar" value="0" min="0" max="100">
      <div class="time-row">
        <span id="currentTime">00:00</span>
        <span id="duration">00:00</span>
      </div>
    </div>

    <div class="status" id="status">Sẵn sàng phát âm thanh</div>
    <div class="hint">Đặt file WAV cùng thư mục với file HTML để chạy dễ nhất.</div>
  </div>

  <script>
    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('playBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const restartBtn = document.getElementById('restartBtn');
    const progress = document.getElementById('progress');
    const currentTimeEl = document.getElementById('currentTime');
    const durationEl = document.getElementById('duration');
    const statusEl = document.getElementById('status');

    function formatTime(seconds) {
      if (isNaN(seconds)) return '00:00';
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
    }

    playBtn.addEventListener('click', async () => {
      try {
        await audio.play();
        statusEl.textContent = 'Đang phát âm thanh';
      } catch (error) {
        statusEl.textContent = 'Không phát được file. Hãy kiểm tra đường dẫn file WAV.';
      }
    });

    pauseBtn.addEventListener('click', () => {
      audio.pause();
      statusEl.textContent = 'Đã tạm dừng';
    });

    restartBtn.addEventListener('click', async () => {
      audio.currentTime = 0;
      try {
        await audio.play();
        statusEl.textContent = 'Đã phát lại từ đầu';
      } catch (error) {
        statusEl.textContent = 'Không phát lại được file. Hãy kiểm tra file WAV.';
      }
    });

    audio.addEventListener('loadedmetadata', () => {
      durationEl.textContent = formatTime(audio.duration);
    });

    audio.addEventListener('timeupdate', () => {
      currentTimeEl.textContent = formatTime(audio.currentTime);
      if (audio.duration) {
        progress.value = (audio.currentTime / audio.duration) * 100;
      }
    });

    progress.addEventListener('input', () => {
      if (audio.duration) {
        audio.currentTime = (progress.value / 100) * audio.duration;
      }
    });

    audio.addEventListener('ended', () => {
      statusEl.textContent = 'Phát xong';
      progress.value = 100;
    });
  </script>
</body>
</html>
