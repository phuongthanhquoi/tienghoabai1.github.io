<div class="page">
    <h2>Luyện đọc pinyin đoán nghĩa</h2>

    <div class="card" id="card">
        Bấm bắt đầu
    </div>

    <br>
    <button class="btn" id="startBtn">Bắt đầu</button>
    <button class="btn" id="resetBtn">Reset</button>
</div>

<style>
.page {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100%;
    text-align: center;
    font-family: Arial, sans-serif;
}

.card {
    width: 360px;
    min-height: 220px;
    padding: 20px;
    background: white;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    line-height: 1.5;
}

.pinyin {
    font-size: 34px;
    color: #222;
    font-weight: bold;
}

.meaning {
    font-size: 22px;
    color: #555;
    margin-top: 16px;
}

.btn {
    margin: 10px 5px 0;
    padding: 10px 20px;
    border: none;
    background: #4CAF50;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
}

.btn:hover {
    opacity: 0.9;
}
</style>

<script>
(() => {
    // Nếu đang chạy bài cũ thì dừng timer cũ lại
    if (window.currentLearningCleanup) {
        window.currentLearningCleanup();
    }

    const words = [
        { pinyin: "qǐngwèn", meaning: "xin lỗi, cho hỏi" },
        { pinyin: "guìxìng", meaning: "quý tính, họ của ngài" },
        { pinyin: "xìng", meaning: "họ" },
        { pinyin: "xiānsheng", meaning: "ông, ngài" },
        { pinyin: "ba", meaning: "trợ từ nghi vấn" },
        { pinyin: "jiào", meaning: "kêu, gọi, tên là" },
        { pinyin: "qǐng", meaning: "mời, xin, nhờ..." },
        { pinyin: "jìn", meaning: "vào" },
        { pinyin: "nǐmen", meaning: "các anh, các bạn, các chị..." },
        { pinyin: "zhè", meaning: "đây, này" },
        { pinyin: "gēge", meaning: "anh trai" },
        { pinyin: "tā", meaning: "anh ấy, ông ấy, nó" },
        { pinyin: "jiějie", meaning: "chị gái" },
        { pinyin: "tā", meaning: "cô ấy, bà ấy, nó" },
        { pinyin: "huānyíng", meaning: "hoan nghênh" },
        { pinyin: "nà", meaning: "kia, ấy, đó" },
        { pinyin: "shéi", meaning: "ai" },
        { pinyin: "mèimei", meaning: "em gái" },
        { pinyin: "péngyou", meaning: "bạn" },
        { pinyin: "wèi", meaning: "vị (lượng từ)" },
        { pinyin: "shénme", meaning: "gì, cái gì" }
    ];

    let remainingWords = [];
    let timer1 = null;
    let timer2 = null;
    let isRunning = false;

    const card = document.getElementById("card");
    const startBtn = document.getElementById("startBtn");
    const resetBtn = document.getElementById("resetBtn");

    function start() {
        clearAllTimers();

        remainingWords = [...words];
        isRunning = true;

        nextWord();
    }

    function nextWord() {
        if (!isRunning) return;

        if (remainingWords.length === 0) {
            card.innerHTML = `
                <div class="pinyin">Hết!</div>
                <div class="meaning">Bạn đã hoàn thành</div>
            `;
            isRunning = false;
            return;
        }

        const randomIndex = Math.floor(Math.random() * remainingWords.length);
        const current = remainingWords[randomIndex];

        // Xóa từ đã hiện để không hiện lại nữa
        remainingWords.splice(randomIndex, 1);

        // Bước 1: chỉ hiện pinyin
        card.innerHTML = `
            <div class="pinyin">${current.pinyin}</div>
        `;

        // Bước 2: sau 4 giây hiện nghĩa
        timer1 = setTimeout(() => {
            if (!isRunning) return;

            card.innerHTML = `
                <div class="pinyin">${current.pinyin}</div>
                <div class="meaning">${current.meaning}</div>
            `;

            // Bước 3: sau 2 giây chuyển sang từ tiếp theo
            timer2 = setTimeout(() => {
                if (!isRunning) return;
                nextWord();
            }, 2000);

        }, 4000);
    }

    function reset() {
        clearAllTimers();

        remainingWords = [];
        isRunning = false;

        card.innerHTML = `Bấm bắt đầu`;
    }

    function clearAllTimers() {
        clearTimeout(timer1);
        clearTimeout(timer2);
    }

    startBtn.onclick = start;
    resetBtn.onclick = reset;

    // Cho trang khác gọi để dọn timer cũ khi đổi menu
    window.currentLearningCleanup = function () {
        clearAllTimers();
        isRunning = false;
    };
})();
</script>
