<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Luyện đọc tiếng Hoa</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #f3f4f6, #e5e7eb);
      font-family: Arial, sans-serif;
    }

    .main-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .study-box {
      width: 100%;
      max-width: 760px;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
      padding: 24px;
    }

    .title {
      font-weight: 700;
      font-size: clamp(28px, 4vw, 40px);
      margin-bottom: 8px;
    }

    .desc {
      color: #6b7280;
      font-size: clamp(14px, 2vw, 18px);
      margin-bottom: 18px;
    }

    .word-card {
      min-height: 320px;
      border: 2px solid #e5e7eb;
      border-radius: 22px;
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    .word-content {
      width: 100%;
    }

    .big-text {
      font-size: clamp(42px, 9vw, 110px);
      font-weight: 700;
      color: #111827;
      line-height: 1.2;
      word-break: break-word;
    }

    .sub-text {
      margin-top: 14px;
      font-size: clamp(24px, 4vw, 38px);
      color: #6b7280;
      font-weight: 600;
      word-break: break-word;
      line-height: 1.4;
    }

    .progress-text {
      margin-top: 16px;
      font-size: clamp(14px, 2vw, 18px);
      color: #374151;
      font-weight: 600;
    }

    .status-text {
      margin-top: 8px;
      font-size: 14px;
      color: #6b7280;
    }

    .btn-custom {
      min-width: 120px;
      border-radius: 14px;
      padding: 12px 18px;
      font-size: 16px;
      font-weight: 600;
    }

    .mode-box {
      max-width: 420px;
      margin: 0 auto 18px auto;
    }

    .form-select {
      border-radius: 14px;
      padding: 12px 14px;
      font-weight: 600;
    }

    @media (max-width: 576px) {
      .study-box {
        padding: 18px;
        border-radius: 18px;
      }

      .word-card {
        min-height: 260px;
        padding: 18px;
      }

      .btn-custom {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container-fluid main-wrap">
    <div class="study-box text-center">
      <h1 class="title">Luyện đọc tiếng Hoa</h1>
      <p class="desc mb-0" id="modeDescription">
        Chọn chế độ học rồi bấm bắt đầu
      </p>

      <div class="mode-box mt-3">
        <select class="form-select" id="modeSelect">
          <option value="hanziToPinyin">Chữ Hán → Pinyin</option>
          <option value="pinyinToMeaning">Pinyin → Nghĩa tiếng Việt</option>
          <option value="meaningToPinyin">Nghĩa tiếng Việt → Pinyin</option>
        </select>
      </div>

      <div class="word-card mt-3" id="card">
        <div class="word-content">
          <div class="big-text">开始</div>
        </div>
      </div>

      <div class="progress-text" id="progress">Bấm bắt đầu</div>
      <div class="status-text" id="statusText">Sẵn sàng</div>

      <div class="row g-3 justify-content-center mt-2">
        <div class="col-12 col-sm-auto">
          <button id="startBtn" class="btn btn-success btn-custom">Bắt đầu</button>
        </div>
        <div class="col-12 col-sm-auto">
          <button id="resetBtn" class="btn btn-danger btn-custom">Reset</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const words = [
      { hanzi: "今天", pinyin: "jīntiān", meaning: "hôm nay" },
      { hanzi: "我们", pinyin: "wǒmen", meaning: "chúng ta" },
      { hanzi: "学", pinyin: "xué", meaning: "học" },
      { hanzi: "什么", pinyin: "shénme", meaning: "cái gì" },
      { hanzi: "第二课", pinyin: "dì èr kè", meaning: "bài 2" },
      { hanzi: "有", pinyin: "yǒu", meaning: "có" },
      { hanzi: "多少", pinyin: "duōshǎo", meaning: "bao nhiêu" },
      { hanzi: "分", pinyin: "fēn", meaning: "phần" },
      { hanzi: "生词", pinyin: "shēngcí", meaning: "từ mới" },
      { hanzi: "专名", pinyin: "zhuānmíng", meaning: "danh từ riêng" },
      { hanzi: "会话", pinyin: "huìhuà", meaning: "hội thoại" },
      { hanzi: "课文", pinyin: "kèwén", meaning: "bài học" },
      { hanzi: "语法", pinyin: "yǔfǎ", meaning: "ngữ pháp" },
      { hanzi: "练习", pinyin: "liànxí", meaning: "luyện tập" },
      { hanzi: "第一", pinyin: "dì yī", meaning: "thứ nhất" },
      { hanzi: "跟", pinyin: "gēn", meaning: "với / cùng" },
      { hanzi: "先", pinyin: "xiān", meaning: "trước" },
      { hanzi: "听", pinyin: "tīng", meaning: "nghe" },
      { hanzi: "说", pinyin: "shuō", meaning: "nói" },
      { hanzi: "读", pinyin: "dú", meaning: "đọc" },
      { hanzi: "写", pinyin: "xiě", meaning: "viết" },
      { hanzi: "中文", pinyin: "zhōngwén", meaning: "tiếng Hoa" },
      { hanzi: "哪", pinyin: "nǎ", meaning: "nào" }
    ];

    const card = document.getElementById("card");
    const progress = document.getElementById("progress");
    const statusText = document.getElementById("statusText");
    const startBtn = document.getElementById("startBtn");
    const resetBtn = document.getElementById("resetBtn");
    const modeSelect = document.getElementById("modeSelect");
    const modeDescription = document.getElementById("modeDescription");

    let shuffledWords = [];
    let currentIndex = 0;
    let timerStep1 = null;
    let timerStep2 = null;
    let isRunning = false;

    function shuffleArray(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function updateModeDescription() {
      const mode = modeSelect.value;

      if (mode === "hanziToPinyin") {
        modeDescription.textContent =
          "Hiện chữ Hán 3 giây, sau đó hiện pinyin 5 giây rồi tự chuyển từ khác";
      } else if (mode === "pinyinToMeaning") {
        modeDescription.textContent =
          "Hiện pinyin 3 giây, sau đó hiện nghĩa tiếng Việt 5 giây rồi tự chuyển từ khác";
      } else {
        modeDescription.textContent =
          "Hiện nghĩa tiếng Việt 5 giây để người dùng tự đọc phiên âm, sau đó hiện pinyin 5 giây rồi tự chuyển từ khác";
      }
    }

    function renderSingle(text) {
      card.innerHTML = `
        <div class="word-content">
          <div class="big-text">${text}</div>
        </div>
      `;
    }

    function renderDouble(mainText, subText) {
      card.innerHTML = `
        <div class="word-content">
          <div class="big-text">${mainText}</div>
          <div class="sub-text">${subText}</div>
        </div>
      `;
    }

    function finishSession() {
  renderSingle("完");
  progress.textContent = `Đã hết ${words.length} từ`;
  statusText.textContent = "Hoàn thành";
  isRunning = false;
  modeSelect.disabled = false;
}

function showNextWord() {
  if (currentIndex >= shuffledWords.length) {
    finishSession();
    return;
  }

  const word = shuffledWords[currentIndex];
  const mode = modeSelect.value;

  progress.textContent = `Từ ${currentIndex + 1} / ${shuffledWords.length}`;

  if (mode === "hanziToPinyin") {
    statusText.textContent = "Đang hiện chữ Hán";
    renderSingle(word.hanzi);

    timerStep1 = setTimeout(() => {
      statusText.textContent = "Đang hiện pinyin";
      renderDouble(word.hanzi, word.pinyin);

      timerStep2 = setTimeout(() => {
        currentIndex++;
        showNextWord();
      }, 3000);
    }, 1000);

  } else if (mode === "pinyinToMeaning") {
    statusText.textContent = "Đang hiện pinyin";
    renderSingle(word.pinyin);

    timerStep1 = setTimeout(() => {
      statusText.textContent = "Đang hiện nghĩa tiếng Việt";
      renderDouble(word.pinyin, word.meaning);

      timerStep2 = setTimeout(() => {
        currentIndex++;
        showNextWord();
      }, 3000);
    }, 2000);

  } else {
    statusText.textContent = "Đang hiện nghĩa tiếng Việt";
    renderSingle(word.meaning);

    timerStep1 = setTimeout(() => {
      statusText.textContent = "Đang hiện pinyin";
      renderDouble(word.meaning, word.pinyin);

      timerStep2 = setTimeout(() => {
        currentIndex++;
        showNextWord();
      }, 5000);
    }, 5000);
  }
}

function startSession() {
  if (isRunning) return;

  clearTimeout(timerStep1);
  clearTimeout(timerStep2);

  shuffledWords = shuffleArray(words);
  currentIndex = 0;
  isRunning = true;
  modeSelect.disabled = true;

  showNextWord();
}

function resetSession() {
  clearTimeout(timerStep1);
  clearTimeout(timerStep2);

  shuffledWords = [];
  currentIndex = 0;
  isRunning = false;
  modeSelect.disabled = false;

  renderSingle("开始");
  progress.textContent = "Bấm bắt đầu";
  statusText.textContent = "Sẵn sàng";
  updateModeDescription();
}

startBtn.addEventListener("click", startSession);
resetBtn.addEventListener("click", resetSession);
modeSelect.addEventListener("change", updateModeDescription);

updateModeDescription();
  </script>
</body>
</html>
